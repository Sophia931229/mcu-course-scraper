name: MCU Course Scraper

on:
  # 每天台灣時間 08:00 & 20:00（UTC 00:00 & 12:00）
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"

  # 手動觸發
  workflow_dispatch:
    inputs:
      reason:
        description: "手動執行原因"
        required: false
        default: "手動觸發"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🕷️ Run scraper
        run: |
          cd scraper
          python mcu_scraper.py
        timeout-minutes: 20

      - name: 📄 Build HTML & copy assets to docs/
        run: |
          mkdir -p docs
          # 複製所有 output 檔案（txt + json + md）到 docs/
          cp -r scraper/output/. docs/
          # 建立 docs/index.html 入口頁（讀取 docs/index.json）
          python scripts/build_html.py

      - name: 💾 Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ scraper/output/
          git diff --cached --quiet && echo "⏭️ 無變更，略過 commit" || {
            git commit -m "🤖 Auto-update: $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M') TST"
            git push
          }
