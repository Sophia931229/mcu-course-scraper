name: MCU Course Scraper

on:
  # ① 每天早上 8:00 & 晚上 8:00 台灣時間（UTC+8 → UTC 00:00 & 12:00）
  schedule:
    - cron: "0 0 * * *"   # 台灣時間 08:00
    - cron: "0 12 * * *"  # 台灣時間 20:00

  # ② 手動觸發（到 Actions 頁面按 Run workflow）
  workflow_dispatch:
    inputs:
      reason:
        description: "手動執行原因"
        required: false
        default: "手動觸發"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允許 push 回 repo

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🕷️ Run scraper
        run: |
          cd scraper
          python mcu_scraper.py
        timeout-minutes: 15

      - name: 📄 Copy output to docs/ for GitHub Pages
        run: |
          mkdir -p docs
          cp -r scraper/output/* docs/
          # 產生 docs/index.html 入口頁
          python scripts/build_html.py

      - name: 💾 Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ scraper/output/ scraper/scraper.log
          git diff --cached --quiet || git commit -m "🤖 Auto-update: $(date '+%Y-%m-%d %H:%M') (Taiwan Time)"
          git push
