name: MCU Course Scraper

on:
  schedule:
    - cron: "0 0 * * *"   # 台灣時間 08:00
    - cron: "0 12 * * *"  # 台灣時間 20:00
  workflow_dispatch:
    inputs:
      reason:
        description: "手動執行原因"
        required: false
        default: "手動觸發"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🕷️ Run scraper
        run: |
          cd scraper
          python mcu_scraper.py
        timeout-minutes: 20

      - name: 📄 Build docs/index.html
        run: python scripts/build_html.py

      - name: 💾 Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html scraper/output/index.json
          git diff --cached --quiet && echo "⏭️ 無變更" || {
            git commit -m "🤖 Auto-update: $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M') TST"
            git push
          }
